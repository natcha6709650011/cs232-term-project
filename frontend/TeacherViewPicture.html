<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ไฟล์แนบ</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 min-h-screen flex flex-col text-white">
  <div class="p-4 flex justify-between items-center bg-slate-900 border-b border-slate-700">
    <h1 id="file-title" class="text-lg font-bold">ไฟล์แนบ</h1>
    <button onclick="closePage()" class="text-sm border border-white/60 px-4 py-2 rounded-lg">ปิด</button>
  </div>

  <main class="flex-1 flex items-center justify-center p-5">
    <div id="file-content" class="w-full max-w-md bg-white text-slate-900 rounded-2xl p-6 text-center shadow-xl">
      <div class="animate-pulse text-lg font-semibold">กำลังโหลดไฟล์แนบ...</div>
      <p class="mt-3 text-sm text-slate-500">กรุณารอสักครู่</p>
    </div>
  </main>

  <div class="p-5 bg-slate-900 space-y-3">
    <button id="open-file-btn" class="hidden w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg">
      เปิดไฟล์แนบ
    </button>
    <button id="download-file-btn" class="hidden w-full bg-slate-700 text-white py-4 rounded-xl font-bold text-lg">
      ดาวน์โหลด/เปิดอีกครั้ง
    </button>
  </div>

  <script src="TeacherViewPicture.js?v=attachment-open-final-1"></script>
</body>
</html>
