<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ยืนยันข้อมูลรายวิชา</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
    </style>
</head>
<body class="bg-gray-300 min-h-screen flex items-center justify-center p-4">

    <div class="bg-[#f0f0f0] w-full max-w-sm rounded-3xl overflow-hidden shadow-2xl border border-gray-200">
        
        <div class="bg-[#3b82f6] p-4 text-white text-center font-semibold relative">
    ข้อมูลรายวิชา
    <button onclick="closeLiff()" class="absolute right-4 top-1/2 -translate-y-1/2 text-white hover:text-gray-200 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
    </button>
</div>

        <div class="p-6">
            <div class="space-y-3">
                <div class="bg-white border border-gray-400 rounded-xl p-3 text-center">
                    <p class="text-xs text-gray-500">รหัสวิชา</p>
                    <p id="course-id" class="font-semibold text-gray-800">กำลังโหลด...</p>
                </div>

                <div class="bg-white border border-gray-400 rounded-xl p-3 text-center">
                    <p class="text-xs text-gray-500">รายวิชา</p>
                    <p id="course-name" class="font-semibold text-gray-800">-</p>
                </div>

                <div class="bg-white border border-gray-400 rounded-xl p-3 text-center">
                    <p class="text-xs text-gray-500">Section</p>
                    <p id="section" class="font-semibold text-gray-800">-</p>
                </div>

                <div class="bg-white border border-gray-400 rounded-xl p-3 text-center">
                    <p class="text-xs text-gray-500">เวลา</p>
                    <p id="time-range" class="font-semibold text-gray-800">-</p>
                </div>

                <div class="bg-white border border-gray-400 rounded-xl p-3 text-center">
                    <p class="text-xs text-gray-500">จำนวนนักศึกษาลงทะเบียน</p>
                    <p id="student-count" class="font-semibold text-gray-800">-</p>
                </div>
            </div>

            <button id="btn-confirm" class="w-full bg-[#2563eb] text-white mt-8 py-3 rounded-xl font-bold shadow-lg active:scale-95 transition-transform">
                ยืนยัน
            </button>
        </div>
    </div>

    <!-- ADDED: LIFF SDK สำหรับอ่าน line_user_id จริงของอาจารย์ -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <!-- ADDED: ใช้ teacherData.js เป็นไฟล์หลักของหน้านี้ -->
    <script src="teacherData.js"></script>
</body>
</html>
